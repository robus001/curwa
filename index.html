<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beatrice Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --accent-color: #e1306c; /* Culoare stil Instagram */
            --card-bg: #2d2d2d;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            background-image: linear-gradient(147deg, #1a1a1a 0%, #000000 74%);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- Header --- */
        header {
            width: 100%;
            padding: 20px 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            z-index: 1000;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 1px;
        }
        
        header span {
            color: var(--accent-color);
            font-weight: 300;
        }

        /* --- Main Container --- */
        .container {
            max-width: 1200px;
            width: 90%;
            margin-top: 100px; /* Ca să nu stea sub header */
            margin-bottom: 50px;
        }

        /* --- Secțiunea Video --- */
        .video-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        video {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            outline: none;
            background: #000;
        }

        /* --- Secțiunea Galerie Poze (Grid) --- */
        .gallery-grid {
            display: grid;
            /* Pe mobil: 1 coloană. Pe ecran mediu: 2 coloane. Pe ecran mare: 3 coloane */
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            background-color: var(--card-bg);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            
            /* Animație de apariție (pentru ScrollReveal) */
            opacity: 0;
            transform: translateY(20px);
        }

        /* Efect de plutire la hover pe PC */
        @media (hover: hover) {
            .gallery-item:hover {
                transform: translateY(-5px) scale(1.02);
                box-shadow: 0 10px 25px rgba(225, 48, 108, 0.3);
            }
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Pozele pătrate/cropuite frumos, nu deformate */
            display: block;
            aspect-ratio: 1 / 1; /* Forțăm pozele să fie pătrate în grid */
        }

        /* --- Footer --- */
        footer {
            margin-top: auto;
            padding: 30px;
            text-align: center;
            width: 100%;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .insta-btn {
            background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .insta-btn:hover {
            opacity: 0.8;
        }

    </style>
</head>
<body>

    <header>
        <h1>Beatrice <span>Insta</span></h1>
    </header>

    <div class="container">
        <div class="video-section">
            <video controls poster=""> <source src="1.mp4" type="video/mp4"> </video>
            <video controls poster=""> <source src="2.mp4" type="video/mp4"> </video>
        </div>

        <div class="gallery-grid" id="gallery">
            </div>
    </div>

    <footer>
        <p>Vezi profilul complet pe</p>
        <a href="https://instagram.com/username" target="_blank" class="insta-btn">
            @instagram_profile
        </a>
    </footer>

    <script src="https://unpkg.com/scrollreveal"></script>
    <script>
        const gallery = document.getElementById('gallery');
        const totalImages = 56;

        // 1. Generăm HTML-ul pentru poze
        for (let i = 1; i <= totalImages; i++) {
            const div = document.createElement('div');
            div.className = 'gallery-item';
            
            const img = document.createElement('img');
            img.src = `${i}.jpg`;
            img.alt = `Beatrice - Poza ${i}`;
            img.loading = "lazy"; // Esențial pentru performanță

            div.appendChild(img);
            gallery.appendChild(div);
        }

        // 2. Activăm animația de apariție la scroll (ScrollReveal)
        ScrollReveal().reveal('.gallery-item', {
            delay: 100,
            distance: '20px',
            origin: 'bottom',
            duration: 800,
            interval: 50, // Timpul dintre apariția pozelor în grid
            rotate: { x: 0, y: 0, z: 2 },
            cleanup: true // Dezactivează animația după ce s-a executat o dată
        });
    </script>
</body>
</html>
