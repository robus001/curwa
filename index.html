<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beatrice Gallery</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: white;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* Titlul de sus */
        .header {
            padding: 40px 20px;
            background: linear-gradient(to bottom, #222, #000);
            border-bottom: 2px solid #e1306c;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5em;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header span {
            color: #e1306c;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 15px;
        }

        /* Stil Video */
        video {
            width: 100%;
            max-width: 800px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid #333;
        }

        /* Stil Galerie Poze - Una sub alta */
        .gallery img {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 25px; /* Spațiu între poze */
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: transform 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.02);
        }

        footer {
            padding: 50px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>BEATRICE <span>INSTA</span></h1>
    </div>

    <div class="container">
        <video controls> <source src="1.mp4" type="video/mp4"> </video>
        <video controls> <source src="2.mp4" type="video/mp4"> </video>

        <hr style="border: 0; height: 1px; background: #333; margin: 40px 0;">

        <div class="gallery" id="imageContainer">
            </div>
    </div>

    <footer>
        Creat special pentru Beatrice &copy; 2024
    </footer>

    <script>
        // Setăm numărul total de poze
        const numarPoze = 56;
        const container = document.getElementById('imageContainer');

        for (let i = 1; i <= numarPoze; i++) {
            // Creăm elementul imagine
            const img = document.createElement('img');
            
            // ATENȚIE: Dacă pozele tale sunt .JPG (cu litere mari), schimbă mai jos .jpg în .JPG
            img.src = i + ".jpg"; 
            
            img.alt = "Poza " + i;
            
            // Adăugăm o verificare: dacă poza nu se încarcă, încercăm varianta cu litere mari .JPG
            img.onerror = function() {
                if (!this.src.endsWith(".JPG")) {
                    this.src = this.src.replace(".jpg", ".JPG");
                }
            };

            container.appendChild(img);
        }
    </script>

</body>
</html>
